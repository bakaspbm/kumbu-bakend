spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/kumbu_db
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    show-sql: false

kumbu:
  cors:
    allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*

logging:
  level:
    com.kumbu: DEBUG
