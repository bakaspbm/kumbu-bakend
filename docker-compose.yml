services:
  postgres:
    image: postgres:16-alpine
    container_name: kumbu-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kumbu}
      POSTGRES_USER: ${POSTGRES_USER:-kumbu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no ficheiro .env}
    ports:
      - "5432:5432"
    volumes:
      - kumbu_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kumbu} -d ${POSTGRES_DB:-kumbu}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kumbu-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: kumbu-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kumbu}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-kumbu}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no ficheiro .env}
      REDIS_HOST: redis
      KUMBU_CACHE_REDIS_ENABLED: "true"
      KUMBU_CACHE_TYPE: redis
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - kumbu_uploads:/app/uploads

volumes:
  kumbu_pg_data:
  kumbu_uploads:
